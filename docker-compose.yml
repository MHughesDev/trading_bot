version: "3.9"

# Default stack: nats, postgres, clickhouse, redis.
# Vector/graph services are off by default — enable with:
#   docker compose --profile vector-graph up
#
# The vector-graph profile starts: milvus (+ etcd + minio), tigergraph.

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--store_dir", "/data"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      CLICKHOUSE_DB: trading
      CLICKHOUSE_USER: trading
      CLICKHOUSE_PASSWORD: trading
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP
      - "9001:9000"   # native (host 9001 avoids collision with TigerGraph REST++ on 9000)
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # TigerGraph graph store — gated behind the "vector-graph" profile (no functional
  # consumer yet; see future-scope.md). Enable with: docker compose --profile vector-graph up
  # Port assignments:
  #   9000  (internal) — REST++ data API  → exposed as 9200 (avoids ClickHouse native collision)
  #   14240 (internal) — GSQL admin API + Studio UI
  tigergraph:
    profiles: ["vector-graph"]
    image: docker.tigergraph.com/tigergraph:3.9.3
    ports:
      - "9200:9000"   # REST++ data API (set TIGERGRAPH_PORT=9200 in .env)
      - "14240:14240" # GSQL API + Studio UI (set TIGERGRAPH_GSQL_PORT=14240)
    volumes:
      - tigergraph_data:/home/tigergraph/tigergraph/data
    environment:
      TIGERGRAPH_AGREED_TO_EULA: "yes"

  # Milvus vector store — gated behind the "vector-graph" profile.
  # Milvus REST v2 API and gRPC both run on port 19530 (Milvus 2.3+).
  # Port 9091 is the legacy metrics/monitoring port only.
  etcd:
    profiles: ["vector-graph"]
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd

  minio:
    profiles: ["vector-graph"]
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9092"
    ports:
      - "9092:9092"   # MinIO console (9001 is taken by ClickHouse native)
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    profiles: ["vector-graph"]
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"  # gRPC + REST v2 API (MILVUS_HTTP_PORT=19530)
      - "9091:9091"    # legacy metrics/monitoring only
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  # ── AI Model Studio (Set H) ──────────────────────────────────────────────────
  # Dedicated artifact-store MinIO for trained model artifacts (separate from the
  # milvus-stack `minio` above; different ports + volume to avoid collisions).
  artifact-minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9101"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9100:9000"
      - "9101:9101"
    volumes:
      - artifact_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  model-trainer:
    build:
      context: ./apps/model-trainer
      dockerfile: Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      ARTIFACT_STORE: fs
      ARTIFACT_STORE_PATH: /artifacts
    volumes:
      - artifacts_data:/artifacts
    ports:
      - "8001:8001"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  model-inference:
    build:
      context: ./apps/model-inference
      dockerfile: Dockerfile
    environment:
      ARTIFACT_STORE: fs
      ARTIFACT_STORE_PATH: /artifacts
    volumes:
      - artifacts_data:/artifacts
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nats_data:
  pg_data:
  ch_data:
  redis_data:
  tigergraph_data:
  etcd_data:
  minio_data:
  milvus_data:
  artifact_minio_data:
  artifacts_data:
