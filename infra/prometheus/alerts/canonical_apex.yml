# APEX canonical alerting (FB-CAN-028)
# Requires scraping /metrics from the control plane (see infra/prometheus/prometheus.yml).
# Tune thresholds per environment; defaults are conservative to reduce noise.

groups:
  - name: canonical_data_state
    rules:
      - alert: CanonicalDataAgeHigh
        expr: |
          histogram_quantile(0.95,
            sum(rate(tb_canonical_data_age_seconds_bucket[5m])) by (le, symbol)
          ) > 90
        for: 10m
        labels:
          severity: warning
          domain: data_quality
        annotations:
          summary: "Canonical data age p95 high (symbol={{ $labels.symbol }})"
          description: "RiskState data_age_seconds distribution suggests stale market/feature inputs."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-028-alert-rules"

      - alert: CanonicalDegradationNoTradeOccupancy
        expr: |
          sum by (symbol) (
            increase(tb_canonical_degradation_observations_total{level="no_trade"}[15m])
          ) > 25
        for: 5m
        labels:
          severity: warning
          domain: state_safety
        annotations:
          summary: "Elevated NO_TRADE degradation observations ({{ $labels.symbol }})"
          description: "Degradation level no_trade tick count increased in the last 15m window."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-028-alert-rules"

  - name: canonical_trigger_auction
    rules:
      - alert: CanonicalTriggerMissedMoveSpike
        expr: |
          sum(increase(tb_canonical_trigger_missed_move_total[20m])) by (symbol) > 8
        for: 5m
        labels:
          severity: warning
          domain: trigger
        annotations:
          summary: "Missed-move flags elevated ({{ $labels.symbol }})"
          description: "Trigger missed_move counter increased faster than baseline; review trigger thresholds and market regime."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-028-alert-rules"

      - alert: CanonicalAuctionSuppressedSpike
        expr: |
          sum(rate(tb_canonical_auction_suppressed_total[10m])) by (symbol) > 0.15
        for: 10m
        labels:
          severity: info
          domain: auction
        annotations:
          summary: "Auction suppression rate elevated ({{ $labels.symbol }})"
          description: "Opportunity auction often had no winner; may be normal in quiet markets—correlate with trigger pass rates."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-028-alert-rules"

  - name: canonical_risk_carry
    rules:
      - alert: CanonicalRiskSizeMultiplierLow
        expr: |
          histogram_quantile(0.05,
            sum(rate(tb_canonical_risk_size_multiplier_bucket[10m])) by (le, symbol)
          ) < 0.35
        for: 15m
        labels:
          severity: warning
          domain: risk
        annotations:
          summary: "Canonical size multiplier persistently low ({{ $labels.symbol }})"
          description: "Risk sizing throttling may be aggressive; review heat, degradation, and edge budget terms."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-028-alert-rules"

      - alert: CanonicalCarrySleeveActive
        expr: |
          max_over_time(tb_canonical_carry_sleeve_active[10m]) > 0.5
        for: 30m
        labels:
          severity: info
          domain: carry
        annotations:
          summary: "Carry sleeve active on {{ $labels.symbol }}"
          description: "Carry path engaged; verify funding signal and isolation behavior match policy."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-028-alert-rules"

      - alert: CanonicalCarryDirectionalSuppressionSpike
        expr: |
          sum(rate(tb_canonical_carry_directional_suppression_total[15m])) by (symbol) > 0.02
        for: 20m
        labels:
          severity: warning
          domain: carry
        annotations:
          summary: "Elevated carry isolation suppressing directional flow ({{ $labels.symbol }})"
          description: "Directional trades blocked for carry attribution isolation more often than baseline; review sleeve config and trigger neutrality."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-064-carry-monitoring"

      - alert: CanonicalCarryDecisionQualityLow
        expr: |
          histogram_quantile(0.95,
            sum(rate(tb_canonical_carry_decision_quality_bucket[20m])) by (le, symbol)
          ) < 0.12
        for: 30m
        labels:
          severity: info
          domain: carry
        annotations:
          summary: "Carry decision quality p95 low (funding×trigger) for {{ $labels.symbol }}"
          description: "When carry evaluates, combined funding and trigger confidence proxy is persistently weak; may indicate quiet funding or weak trigger alignment."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-064-carry-monitoring"

  - name: canonical_governance_operator_fb_can_065
    rules:
      - alert: GovernancePromotionGateFailures
        expr: |
          sum(increase(tb_governance_gate_outcome_total{outcome="blocked"}[15m])) > 0
        for: 5m
        labels:
          severity: warning
          domain: governance
        annotations:
          summary: "Release promotion gates returned blocked in the last 15m"
          description: "At least one evaluate_promotion_gates call did not allow promotion; inspect governance API payloads and evidence packages."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-065-governance-operator-monitoring"

      - alert: GovernanceConfigDiffRequiresReview
        expr: |
          sum(increase(tb_governance_config_drift_event_total{requires_operator_review="true"}[1h])) > 0
        for: 5m
        labels:
          severity: warning
          domain: governance
        annotations:
          summary: "Canonical config diff flagged operator review (risk/execution semantics)"
          description: "POST /governance/release-evidence/diff reported semantic changes requiring review."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-065-governance-operator-monitoring"

      - alert: GovernanceRollbackLedgerEvent
        expr: |
          sum(increase(tb_governance_rollback_event_total[1h])) > 0
        for: 1m
        labels:
          severity: info
          domain: governance
        annotations:
          summary: "Rollback lifecycle recorded on a release candidate"
          description: "A release object was written with current_stage=rolled_back; confirm playbook execution."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-065-governance-operator-monitoring"

  - name: canonical_governance_shadow
    rules:
      - alert: CanonicalShadowDivergenceEvents
        expr: |
          sum(rate(tb_canonical_replay_shadow_divergence_total[5m])) by (kind) > 0
        for: 5m
        labels:
          severity: info
          domain: shadow_replay
        annotations:
          summary: "Shadow/replay divergence event rate (kind={{ $labels.kind }})"
          description: "Divergence counter is increasing; correlate with release and replay jobs when wired."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-028-alert-rules"

  - name: canonical_drift_calibration_fb_can_039
    rules:
      - alert: CanonicalEdgeErosionHigh
        expr: |
          histogram_quantile(0.95,
            sum(rate(tb_canonical_edge_erosion_score_bucket[15m])) by (le, symbol)
          ) > 0.45
        for: 15m
        labels:
          severity: warning
          domain: drift_calibration
        annotations:
          summary: "High realized-vs-theoretical edge erosion proxy (symbol={{ $labels.symbol }})"
          description: "Trade-intent ticks show large gap between joint route×trigger confidence and execution confidence."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-039-alert-rules-drift--calibration--shadow-trends"

      - alert: CanonicalConfidenceCalibrationGap
        expr: |
          histogram_quantile(0.95,
            sum(rate(tb_canonical_confidence_calibration_gap_bucket[10m])) by (le, symbol)
          ) > 0.35
        for: 15m
        labels:
          severity: warning
          domain: drift_calibration
        annotations:
          summary: "Route vs forecaster confidence gap elevated (symbol={{ $labels.symbol }})"
          description: "Calibration drift proxy: absolute difference between route confidence and packet confidence."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-039-alert-rules-drift--calibration--shadow-trends"

      - alert: CanonicalShadowDivergenceRateHigh
        expr: |
          max(tb_canonical_shadow_divergence_rate{rate_kind="trade_intent_divergence"}) > 0.12
        for: 10m
        labels:
          severity: warning
          domain: shadow_replay
        annotations:
          summary: "Shadow replay trade-intent divergence rate above threshold"
          description: "Last persisted governance shadow comparison shows elevated trade_intent_divergence rate."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-039-alert-rules-drift--calibration--shadow-trends"

      - alert: CanonicalShadowRollbackRecommended
        expr: |
          tb_canonical_shadow_rollback_recommended == 1
        for: 2m
        labels:
          severity: critical
          domain: shadow_replay
        annotations:
          summary: "Shadow comparison recommends rollback"
          description: "Governance shadow replay report set rollback_recommended; review release and candidate logic."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-039-alert-rules-drift--calibration--shadow-trends"

  - name: canonical_governance_probation_fb_can_069
    rules:
      - alert: GovernanceProbationAbortRecommended
        expr: tb_governance_probation_abort_recommended == 1
        for: 2m
        labels:
          severity: critical
          domain: governance
        annotations:
          summary: "Post-release probation recommends abort/rollback"
          description: "Rolling risk-quality proxies breached policy during the active live probation window; review release ledger and execute rollback playbook."
          runbook: "docs/MONITORING_CANONICAL.MD#fb-can-069-post-release-probation"
