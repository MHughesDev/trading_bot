# FB-CONT-004 — optional TLS reverse proxy (Caddy) in front of the API
#
# Merge after data + app stacks (same Docker project / default **trading-bot** network):
#
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.app.yml -f infra/docker-compose.edge.yml up -d
#
# HTTPS on host **8443** → container **443** (self-signed **tls internal** for **app.localhost**).
# Add to /etc/hosts:  127.0.0.1 app.localhost
#   https://app.localhost:8443  — React SPA + REST API (same service)
#
# For public domains + Let's Encrypt, edit **infra/caddy/Caddyfile** (real DNS, drop `tls internal`).

services:
  trading-bot-edge:
    image: caddy:2.8-alpine
    container_name: tb-caddy-edge
    ports:
      - "8443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - trading-bot-api
