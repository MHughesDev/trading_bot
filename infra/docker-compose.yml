# NautilusMonster V3 — local stack (QuestDB, Redis, Qdrant, observability)
# Usage: docker compose -f infra/docker-compose.yml up -d

services:
  questdb:
    image: questdb/questdb:8.2.1
    container_name: nm-questdb
    ports:
      - "9000:9000"   # HTTP / REST / Web Console
      - "9009:9009"   # Influx line protocol
      - "8812:8812"   # PostgreSQL wire
    environment:
      QDB_TELEMETRY_ENABLED: "false"
    volumes:
      - questdb_data:/var/lib/questdb

  redis:
    image: redis:7.2-alpine
    container_name: nm-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: nm-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: nm-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: nm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

  promtail:
    image: grafana/promtail:3.2.1
    container_name: nm-promtail
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki

  loki:
    image: grafana/loki:3.2.1
    container_name: nm-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

volumes:
  questdb_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  default:
    name: nautilus-monster
