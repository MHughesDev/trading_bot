# Optional overlay: Redis + market_data / feature / decision / risk / execution gateway (dev convenience).
#
# From repository root:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.microservices.yml up -d redis market_data_service feature_service decision_service risk_service execution_gateway
#
# Ports: market_data 8206, feature 8205, decision 8203, risk 8204, gateway 8202.
# POST /ingest/raw-tick on market_data (8206) or /ingest/market-tick on feature (8205).
# First start runs pip install per container (slow).

services:
  market_data_service:
    image: python:3.12-slim-bookworm
    container_name: nm-market-data-service
    working_dir: /workspace
    volumes:
      - ..:/workspace
    ports:
      - "8206:8206"
    environment:
      NM_MESSAGING_BACKEND: redis_streams
      NM_REDIS_URL: redis://redis:6379/0
    command:
      - sh
      - -c
      - pip install -q -e ".[dev]" && python -m uvicorn services.market_data_service.main:app --host 0.0.0.0 --port 8206
    depends_on:
      redis:
        condition: service_healthy

  feature_service:
    image: python:3.12-slim-bookworm
    container_name: nm-feature-service
    working_dir: /workspace
    volumes:
      - ..:/workspace
    ports:
      - "8205:8205"
    environment:
      NM_MESSAGING_BACKEND: redis_streams
      NM_REDIS_URL: redis://redis:6379/0
      NM_RISK_SIGNING_SECRET: dev-risk-secret
    command:
      - sh
      - -c
      - pip install -q -e ".[dev]" && python -m uvicorn services.feature_service.main:app --host 0.0.0.0 --port 8205
    depends_on:
      redis:
        condition: service_healthy

  decision_service:
    image: python:3.12-slim-bookworm
    container_name: nm-decision-service
    working_dir: /workspace
    volumes:
      - ..:/workspace
    ports:
      - "8203:8203"
    environment:
      NM_MESSAGING_BACKEND: redis_streams
      NM_REDIS_URL: redis://redis:6379/0
      NM_RISK_SIGNING_SECRET: dev-risk-secret
    command:
      - sh
      - -c
      - pip install -q -e ".[dev]" && python -m uvicorn services.decision_service.main:app --host 0.0.0.0 --port 8203
    depends_on:
      redis:
        condition: service_healthy

  risk_service:
    image: python:3.12-slim-bookworm
    container_name: nm-risk-service
    working_dir: /workspace
    volumes:
      - ..:/workspace
    ports:
      - "8204:8204"
    environment:
      NM_MESSAGING_BACKEND: redis_streams
      NM_REDIS_URL: redis://redis:6379/0
      NM_RISK_SIGNING_SECRET: dev-risk-secret
    command:
      - sh
      - -c
      - pip install -q -e ".[dev]" && python -m uvicorn services.risk_service.main:app --host 0.0.0.0 --port 8204
    depends_on:
      redis:
        condition: service_healthy

  execution_gateway:
    image: python:3.12-slim-bookworm
    container_name: nm-execution-gateway
    working_dir: /workspace
    volumes:
      - ..:/workspace
    ports:
      - "8202:8202"
    environment:
      NM_MESSAGING_BACKEND: redis_streams
      NM_REDIS_URL: redis://redis:6379/0
      NM_EXECUTION_GATEWAY_SUBMIT: "true"
      NM_EXECUTION_ADAPTER: stub
      NM_RISK_SIGNING_SECRET: dev-risk-secret
      NM_ALLOW_UNSIGNED_EXECUTION: "false"
    command:
      - sh
      - -c
      - pip install -q -e ".[dev]" && python -m uvicorn services.execution_gateway_service.main:app --host 0.0.0.0 --port 8202
    depends_on:
      redis:
        condition: service_healthy
