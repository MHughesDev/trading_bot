execution:
  mode: paper
  live_adapter: coinbase
  paper_adapter: alpaca

market_data:
  provider: coinbase
  websocket_url: wss://advanced-trade-ws.coinbase.com
  rest_url: https://api.exchange.coinbase.com
  symbols:
    - BTC-USD
    - ETH-USD
    - SOL-USD
  channels:
    - ticker
    - market_trades
    - level2
    - candles

storage:
  questdb:
    host: localhost
    ilp_http_port: 9000
    enabled: true
  redis:
    host: localhost
    port: 6379
    db: 0
    enabled: true
  qdrant:
    host: localhost
    port: 6333
    collection: news_context_memory
    enabled: true
  mlflow:
    tracking_uri: http://localhost:5000
    enabled: true

risk:
  max_total_exposure_usd: 100000.0
  max_symbol_exposure_usd: 40000.0
  max_drawdown_pct: 0.15
  max_spread_bps: 25.0
  stale_data_seconds: 10
  max_order_notional_usd: 5000.0

models:
  regime:
    n_states: 4
    covariance_type: full
    random_state: 42
  forecast:
    horizons:
      - 1
      - 3
      - 5
      - 15
  memory:
    top_k: 12
    refresh_seconds: 60

service:
  log_level: INFO
