execution:
  mode: live
  live_adapter: coinbase
  paper_adapter: alpaca
  portfolio_mark_price_source_paper: kraken_mid
  portfolio_mark_price_source_live: venue_only
  position_reconcile_enabled: false
  position_reconcile_interval_seconds: 60
market_data:
  provider: kraken
  bar_interval_seconds: 1
  training_granularity_seconds: 60
  symbols:
  - BTC-USD
  - ETH-USD
  - SOL-USD
live_watch:
  lifecycle_gate: false
  decision_min_interval_seconds: 0
init_pipeline:
  bootstrap_lookback_days: 14
  bootstrap_granularity_seconds: 60
  artifacts_dir: data/asset_init
  forecaster_distill_epochs: 8
memory:
  qdrant_collection: news_context_memory
  retrieval_interval_seconds: 60
  top_k: 10
risk:
  max_total_exposure_usd: 100000
  max_per_symbol_usd: 40000
  max_drawdown_pct: 0.15
  max_spread_bps: 50
  stale_data_seconds: 120
features:
  return_windows:
  - 1
  - 3
  - 5
  - 15
  volatility_windows:
  - 5
  - 15
  - 60
backtesting:
  slippage_bps: 5.0
  fee_bps: 10.0
  slippage_noise_bps: 0.0
  rng_seed: null
  initial_cash_usd: 100000
  enforce_solvency: true
  replay_available_cash: false
routing:
  spread_trade_max_bps: 30.0
  forecast_strength_min: 0.001
  score_weights:
    scalping_forecast: 3.0
    intraday_forecast: 2.0
    swing_forecast: 2.0
    spread_penalty_per_bp: 0.01
redis:
  bar_ttl_seconds: 86400
sentiment:
  use_finbert: false
  rss_feeds: []
  fetch_timeout_seconds: 15
control_plane:
  host: 0.0.0.0
  port: 8000
  cors_allow_origins: '*'
  rate_limit_enabled: false
  rate_limit_per_minute: 120
observability:
  log_level: INFO
  metrics_port: 8000
questdb:
  persist_decision_traces: false
  persist_canonical_bars: false
  startup_gap_detection: false
  startup_kraken_backfill: false
  backfill_max_lookback_days: 14
  persist_microservice_events: false
  batch_max_rows: 500
  flush_interval_seconds: 2.0
models:
  forecaster_checkpoint_id: null
  forecaster_conformal_state_path: null
  forecaster_weights_path: null
  forecaster_torch_path: null
  policy_mlp_path: null
  active_set_path: null
  active_set_label: null
  active_set_manifest_version: null
  torch_device: auto
  active_registry_path: null
microservices:
  runtime_bridge_enabled: false
  execution_gateway_mode: in_process
scheduler:
  nightly_enabled: false
  nightly_interval_seconds: 86400
  nightly_per_asset_forecaster: true
  nightly_rl_requires_trade: true
  nightly_rl_trade_lookback_days: null
universe:
  alpaca_db_path: data/alpaca_universe.sqlite
  alpaca_sync_enabled: false
  alpaca_sync_interval_seconds: 86400
  coinbase_db_path: data/coinbase_universe.sqlite
  coinbase_sync_enabled: false
  coinbase_sync_interval_seconds: 86400
  platform_supported_mode: intersection
auth:
  users_db_path: data/users.sqlite
  session_enabled: false
  session_ttl_seconds: 604800
  session_cookie_name: tb_operator_session
  session_cookie_secure: false
  session_cookie_samesite: lax
  venue_credentials_master_secret: null
