# NautilusMonster V3 — default configuration (override with NM_* env or file path)

execution:
  mode: paper # paper | live
  live_adapter: coinbase
  paper_adapter: alpaca
  # Paper only: periodically replace in-memory positions with Alpaca fetch_positions (Issue 16/18)
  position_reconcile_enabled: false
  position_reconcile_interval_seconds: 60

market_data:
  provider: coinbase
  symbols:
    - BTC-USD
    - ETH-USD
    - SOL-USD

memory:
  qdrant_collection: news_context_memory
  retrieval_interval_seconds: 60
  top_k: 10

risk:
  max_total_exposure_usd: 100000
  max_per_symbol_usd: 40000
  max_drawdown_pct: 0.15
  max_spread_bps: 50
  stale_data_seconds: 120

features:
  return_windows: [1, 3, 5, 15]
  volatility_windows: [5, 15, 60]

backtesting:
  slippage_bps: 5.0
  fee_bps: 10.0 # round-trip style fee on notional (per fill)
  slippage_noise_bps: 0.0 # set >0 for stochastic slippage; use rng_seed for reproducibility
  rng_seed: null # e.g. 42 for deterministic noise; null = process-global Random
  initial_cash_usd: 100000
  # When track_portfolio=True in replay: block buys if cash + fees would go negative
  enforce_solvency: true
  # When true and track_portfolio: pass simulated cash into risk as available_cash_usd
  replay_available_cash: false

routing:
  # Deterministic route selector (spec §9) — thresholds in config, not code magic numbers
  spread_trade_max_bps: 30.0
  forecast_strength_min: 0.001
  score_weights:
    scalping_forecast: 3.0
    intraday_forecast: 2.0
    swing_forecast: 2.0
    spread_penalty_per_bp: 0.01

redis:
  bar_ttl_seconds: 86400

sentiment:
  # FinBERT etc. wired in orchestration; V1 uses neutral stub if no model
  use_finbert: false
  # RSS/Atom URLs for headline fetch (optional). Empty = neutral sentiment features.
  rss_feeds: []
  fetch_timeout_seconds: 15

control_plane:
  host: "0.0.0.0"
  port: 8000

observability:
  log_level: INFO
  metrics_port: 8000

questdb:
  # NM_QUESTDB_PERSIST_DECISION_TRACES=true to write JSON traces from live_service
  persist_decision_traces: false
  batch_max_rows: 500
  flush_interval_seconds: 2.0

# Optional: load trained HMM / forecast surrogates from disk (joblib)
models:
  # When true, `DecisionPipeline` builds a `ForecastPacket` each step (for diagnostics / policy).
  # `decision_forecast_routing_source` controls whether routing uses Ridge `ForecastOutput` or values derived from the packet (FB-FR-PG1).
  # `decision_pipeline_mode`: legacy (Ridge + router + propose_action) vs spec_policy (ForecastPacket + PolicySystem). See docs/MIGRATION_TO_SPEC_PIPELINE.MD
  decision_forecast_packet_enabled: false
  decision_forecast_routing_source: ridge # ridge | packet
  decision_pipeline_mode: spec_policy # legacy | spec_policy — default: human-spec ForecastPacket + PolicySystem
#   regime_path: models/artifacts/regime.joblib
#   forecast_path: models/artifacts/forecast.joblib

# Set NM_RISK_SIGNING_SECRET in production so only RiskEngine-signed OrderIntents execute.
# NM_ALLOW_UNSIGNED_EXECUTION=true only for local dev without secrets.
# NM_CONTROL_PLANE_API_KEY protects POST /params, /system/mode, /flatten (header X-API-Key).
