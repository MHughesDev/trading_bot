apex_canonical:
  metadata:
    config_version: 1.0.0
    config_name: trading-bot-default
    created_by: repo-default.yaml
    environment_scope: unspecified
    notes: Optional; merge over synthesized legacy projection from flat settings.
    enabled_feature_families:
    - market_microstructure
    - funding
    - open_interest
    - basis
    - cross_exchange_divergence
    - liquidation_structure
    - execution_feedback
    - novelty
    - heat_components
  domains:
    state_safety_degradation:
      heat_weights:
        Hf: 0.2
        Hl: 0.25
        Ho: 0.15
        Hx: 0.15
        Hv: 0.15
        He: 0.1
      novelty_weights:
        ood: 0.38
        hmm_ambiguity: 0.22
        structure_fragility: 0.25
        transition: 0.15
      reflexivity_weights:
        rsi_ext: 0.3
        rel_vol: 0.25
        fragility: 0.25
        directional_pressure: 0.2
    auction:
      top_n: 1
      max_candidates: 3
      saturation_warn_score: 0.85
      thesis_overlap_cap: 0.72
      thesis_overlap_weight: 1.15
      book_exposure_stress_boost: 0.45
      liquidation_stress_dominance_threshold: 0.55
      stress_regime_min_for_dominance: 0.18
      defense_posture_penalty_boost: 0.38
    risk_sizing:
      max_total_exposure_usd: 100000
      max_per_symbol_usd: 40000
      max_drawdown_pct: 0.15
      max_spread_bps: 50
      stale_data_seconds: 120
      quantile_asymmetry_boost_cap: 1.2
      carry_asymmetry_boost_cap: 1.15
      position_inertia_penalty_weight: 0.55
      position_inertia_min_multiplier: 0.35
      edge_budget_weight_heat: 0.45
      edge_budget_weight_exposure: 0.35
      edge_budget_weight_symbol_exposure: 0.2
      edge_budget_strength: 0.62
      edge_budget_min_multiplier: 0.35
      symbol_concentration_threshold: 0.38
      symbol_concentration_strength: 2.2
      symbol_concentration_min_floor: 0.25
      book_concentration_threshold: 0.82
      book_concentration_strength: 3.0
      book_concentration_min_floor: 0.4
      transition_size_multiplier_weight: 0.35
      novelty_size_multiplier_weight: 0.25
      max_transition_novelty_multiplier_weight: 0.55
    execution:
      high_confidence_threshold: 0.72
      medium_confidence_threshold: 0.45
      passive_spread_limit_bps: 18.0
      emergency_remaining_edge_floor: 0.001
      stress_twap_exec_conf_below: 0.25
      suppress_exec_conf_below: 0.12
      minimum_tradeable_edge: 0.0015
      remaining_edge_scale: 0.9
      urgency_trigger_strength_above: 0.55
      urgency_trigger_confidence_above: 0.4
      worst_case_slippage_multiplier: 2.5
      partial_fill_min_remaining_fraction: 0.02
      partial_fill_low_execution_floor: 0.22
    signal_confidence:
      market_microstructure:
        enabled: true
        base_confidence_floor: 0.05
        base_confidence_cap: 1.0
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 2.0
        latency_penalty_weight: 0.35
        reliability_penalty_weight: 0.25
      funding:
        enabled: true
        base_confidence_floor: 0.05
        base_confidence_cap: 0.85
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 1.5
        latency_penalty_weight: 0.2
        reliability_penalty_weight: 0.3
      open_interest:
        enabled: true
        base_confidence_floor: 0.05
        base_confidence_cap: 0.82
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 1.5
        latency_penalty_weight: 0.2
        reliability_penalty_weight: 0.3
      basis:
        enabled: true
        base_confidence_floor: 0.05
        base_confidence_cap: 0.82
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 1.5
        latency_penalty_weight: 0.25
        reliability_penalty_weight: 0.25
      cross_exchange_divergence:
        enabled: true
        base_confidence_floor: 0.05
        base_confidence_cap: 0.8
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 1.8
        latency_penalty_weight: 0.3
        reliability_penalty_weight: 0.3
      liquidation_structure:
        enabled: true
        base_confidence_floor: 0.05
        base_confidence_cap: 0.8
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 1.6
        latency_penalty_weight: 0.25
        reliability_penalty_weight: 0.28
      options_context:
        enabled: false
        base_confidence_floor: 0.0
        base_confidence_cap: 0.15
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 1.2
        latency_penalty_weight: 0.15
        reliability_penalty_weight: 0.2
      stablecoin_flow_proxy:
        enabled: false
        base_confidence_floor: 0.0
        base_confidence_cap: 0.15
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 1.0
        latency_penalty_weight: 0.15
        reliability_penalty_weight: 0.2
      execution_feedback:
        enabled: true
        base_confidence_floor: 0.1
        base_confidence_cap: 1.0
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 1.0
        latency_penalty_weight: 0.2
        reliability_penalty_weight: 0.35
      novelty:
        enabled: true
        base_confidence_floor: 0.0
        base_confidence_cap: 1.0
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 0.8
        latency_penalty_weight: 0.15
        reliability_penalty_weight: 0.4
      heat_components:
        enabled: true
        base_confidence_floor: 0.05
        base_confidence_cap: 1.0
        freshness_floor: 0.0
        freshness_cap: 1.0
        decay_lambda: 1.2
        latency_penalty_weight: 0.25
        reliability_penalty_weight: 0.3
    feature_families:
      market_microstructure:
        enabled: true
      funding:
        enabled: true
      open_interest:
        enabled: true
      basis:
        enabled: true
      cross_exchange_divergence:
        enabled: true
      liquidation_structure:
        enabled: true
      options_context:
        enabled: false
      stablecoin_flow_proxy:
        enabled: false
      execution_feedback:
        enabled: true
      novelty:
        enabled: true
      heat_components:
        enabled: true
    shadow_comparison:
      enabled: true
      thresholds:
        trigger_divergence_max: 0.05
        candidate_divergence_max: 0.08
        auction_divergence_max: 0.08
        suppression_divergence_max: 0.05
        trade_intent_divergence_max: 0.06
      probation:
        min_bars: 200
      rollback:
        severe_rate_multiplier: 1.5
execution:
  mode: live
  live_adapter: coinbase
  paper_adapter: alpaca
  portfolio_mark_price_source_paper: kraken_mid
  portfolio_mark_price_source_live: venue_only
  position_reconcile_enabled: false
  position_reconcile_interval_seconds: 60
market_data:
  provider: kraken
  bar_interval_seconds: 1
  training_granularity_seconds: 60
  symbols:
  - BTC-USD
  - ETH-USD
  - SOL-USD
live_watch:
  lifecycle_gate: false
  decision_min_interval_seconds: 0
init_pipeline:
  bootstrap_lookback_days: 14
  bootstrap_granularity_seconds: 60
  artifacts_dir: data/asset_init
  forecaster_distill_epochs: 8
memory:
  qdrant_collection: news_context_memory
  retrieval_interval_seconds: 60
  top_k: 10
features:
  return_windows:
  - 1
  - 3
  - 5
  - 15
  volatility_windows:
  - 5
  - 15
  - 60
backtesting:
  slippage_bps: 5.0
  fee_bps: 10.0
  slippage_noise_bps: 0.0
  rng_seed: null
  initial_cash_usd: 100000
  enforce_solvency: true
  replay_available_cash: false
routing:
  spread_trade_max_bps: 30.0
  forecast_strength_min: 0.001
  score_weights:
    scalping_forecast: 3.0
    intraday_forecast: 2.0
    swing_forecast: 2.0
    spread_penalty_per_bp: 0.01
redis:
  bar_ttl_seconds: 86400
sentiment:
  use_finbert: false
  rss_feeds: []
  fetch_timeout_seconds: 15
control_plane:
  host: 0.0.0.0
  port: 8000
  cors_allow_origins: '*'
  rate_limit_enabled: false
  rate_limit_per_minute: 120
observability:
  log_level: INFO
  metrics_port: 8000
questdb:
  persist_decision_traces: false
  persist_canonical_bars: false
  startup_gap_detection: false
  startup_kraken_backfill: false
  backfill_max_lookback_days: 14
  persist_microservice_events: false
  batch_max_rows: 500
  flush_interval_seconds: 2.0
models:
  forecaster_checkpoint_id: null
  forecaster_conformal_state_path: null
  forecaster_weights_path: null
  forecaster_torch_path: null
  policy_mlp_path: null
  active_set_path: null
  active_set_label: null
  active_set_manifest_version: null
  torch_device: auto
  active_registry_path: null
microservices:
  runtime_bridge_enabled: false
  execution_gateway_mode: in_process
scheduler:
  nightly_enabled: false
  nightly_interval_seconds: 86400
  nightly_per_asset_forecaster: true
  nightly_rl_requires_trade: true
  nightly_rl_trade_lookback_days: null
universe:
  alpaca_db_path: data/alpaca_universe.sqlite
  alpaca_sync_enabled: false
  alpaca_sync_interval_seconds: 86400
  coinbase_db_path: data/coinbase_universe.sqlite
  coinbase_sync_enabled: false
  coinbase_sync_interval_seconds: 86400
  platform_supported_mode: intersection
auth:
  users_db_path: data/users.sqlite
  session_enabled: false
  session_ttl_seconds: 604800
  session_cookie_name: tb_operator_session
  session_cookie_secure: false
  session_cookie_samesite: lax
  venue_credentials_master_secret: null
