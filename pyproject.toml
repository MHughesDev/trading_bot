[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nautilus-monster"
version = "0.1.0"
description = "NautilusMonster V3 — Coinbase data, Alpaca paper execution, AI trading pipeline"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
  "websockets>=12.0",
  "httpx>=0.27",
  "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4"]

[tool.setuptools.packages.find]
where = ["."]
include = ["app*", "data_plane*", "execution*", "models*", "decision_engine*", "risk_engine*", "backtesting*", "control_plane*", "orchestration*", "observability*"]

[tool.ruff]
line-length = 100
target-version = "py311"
