# target-cpu=native is NOT set here — it breaks CI runners that lack AVX-512.
# For production single-machine deployments, set it at build time:
#   RUSTFLAGS="-C target-cpu=native" cargo build --release
# For a portable AVX2 baseline use target-cpu=x86-64-v3 instead.

[alias]
xt = "run --package xtask --"
xtask = "run --package xtask --"

# Fetch git dependencies (the pinned market_simulator SDK) with the system git
# binary so it uses the environment's credentials / proxy, rather than cargo's
# built-in libgit2 transport.
[net]
git-fetch-with-cli = true

[env]
RUST_LOG = { value = "info", force = false }
