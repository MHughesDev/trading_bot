name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --workspace --lib

  check-money:
    name: Money safety (no f64 on price/size)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run f64 check
        run: cargo xtask check-money-f64

  builders-purity:
    name: builders/features purity (no I/O deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tree
        run: cargo install cargo-tree 2>/dev/null || true
      - name: Check builders has no storage/event-bus deps
        run: |
          BUILDERS_DEPS=$(cargo tree -p builders --edges normal 2>&1 || true)
          for forbidden in sqlx clickhouse redis async-nats event-bus storage; do
            if echo "$BUILDERS_DEPS" | grep -q "$forbidden"; then
              echo "ERROR: builders/ depends on $forbidden (purity violation)"
              exit 1
            fi
          done
          echo "builders/ purity check passed"
      - name: Check features has no storage/event-bus deps
        run: |
          FEATURES_DEPS=$(cargo tree -p features --edges normal 2>&1 || true)
          for forbidden in sqlx clickhouse redis async-nats event-bus storage; do
            if echo "$FEATURES_DEPS" | grep -q "$forbidden"; then
              echo "ERROR: features/ depends on $forbidden (purity violation)"
              exit 1
            fi
          done
          echo "features/ purity check passed"
