# FB-I2 / HG-13 — lint, unit tests, spec scripts. Integration job is optional (services).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Pytest
        run: python -m pytest tests/ -q
      - name: Spec compliance
        run: bash scripts/ci_spec_compliance.sh
      - name: MLflow promotion policy
        run: bash scripts/ci_mlflow_promotion_policy.sh

  integration-optional:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333
      questdb:
        image: questdb/questdb:8.2.1
        ports:
          - 8812:8812
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Integration tests
        env:
          NM_INTEGRATION_SERVICES: "1"
        run: python -m pytest tests/test_integration_optional_services.py -q
