# FB-I2 / HG-13 — lint, unit tests, spec scripts. Integration job is optional (services).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      # FB-AUD-018: audit **project** env only (see scripts/ci_pip_audit.sh — avoids scoring system site-packages).
      - name: pip-audit (release-blocking)
        run: bash scripts/ci_pip_audit.sh
      - name: Bandit (High severity)
        run: bash scripts/ci_bandit.sh
      - name: Pytest
        run: python -m pytest tests/ -q
      - name: Spec compliance
        run: bash scripts/ci_spec_compliance.sh
      - name: Queue stack consistency
        run: python3 scripts/ci_queue_consistency.py
      - name: MLflow promotion policy
        run: bash scripts/ci_mlflow_promotion_policy.sh
      - name: Canonical contracts + release-gate fixture (FB-CAN-013)
        run: bash scripts/ci_canonical_contracts.sh

  # FB-AUD-019 — secret scan (Docker image on ubuntu-latest)
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.21.2 \
            detect --source /repo --verbose --redact

  # FB-CONT-003 — Docker image build + smoke; optional linters (no secrets / no NM_* needed)
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
      - name: Build image
        run: docker build -t trading-bot:ci .
      - name: Smoke import
        run: docker run --rm trading-bot:ci python -c "import app; import control_plane.api"
      # Pin to v0.35.0+ — bare 0.28.0 tag no longer resolves after upstream tag migration / supply-chain remediation (2026).
      - name: Trivy filesystem scan (informational)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"

  integration-optional:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333
      questdb:
        image: questdb/questdb:8.2.1
        ports:
          - 8812:8812
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Integration tests
        env:
          NM_INTEGRATION_SERVICES: "1"
        run: |
          python -m pytest tests/test_integration_optional_services.py -q
          python -m pytest tests/test_integration_microservices_redis.py -q
